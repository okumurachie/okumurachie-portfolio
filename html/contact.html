<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>okumurachie | お問い合わせ</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Outfit:wght@300;400;500;600&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="../style.css" />
    </head>
    <body>
        <div class="bg-orb orb1" aria-hidden="true"></div>
        <div class="bg-orb orb2" aria-hidden="true"></div>

        <main class="page-main">
            <!-- ページヘッダー -->
            <div class="page-header">
                <p class="section-label">Contact</p>
                <h1 class="section-title">お問い合わせ</h1>
                <p class="section-desc">
                    お仕事のご依頼・ご相談はお気軽にどうぞ。通常24時間以内にご返信します。
                </p>
            </div>

            <!-- お問い合わせカード -->
            <div class="contact-card reveal">
                <form
                    id="contactForm"
                    action="https://formspree.io/f/mdaprgdn"
                    method="POST"
                >
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="name"
                                >お名前 <span class="required">*</span></label
                            >
                            <input
                                type="text"
                                id="name"
                                name="name"
                                placeholder="山田 太郎"
                                required
                            />
                        </div>
                        <div class="form-group">
                            <label for="email"
                                >メールアドレス
                                <span class="required">*</span></label
                            >
                            <input
                                type="email"
                                id="email"
                                name="email"
                                placeholder="example@mail.com"
                                required
                            />
                        </div>
                        <div class="form-group form-full">
                            <label for="subject">件名</label>
                            <input
                                type="text"
                                id="subject"
                                name="subject"
                                placeholder="お仕事のご依頼について"
                            />
                        </div>
                        <div class="form-group form-full">
                            <label for="message"
                                >メッセージ
                                <span class="required">*</span></label
                            >
                            <textarea
                                id="message"
                                name="message"
                                placeholder="ご用件をお書きください…"
                                required
                            ></textarea>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary form-submit">
                        送信する →
                    </button>
                    <p class="form-success" id="formSuccess" hidden>
                        ✓ メッセージを受け付けました。ありがとうございます！
                    </p>
                </form>

                <!-- 直接連絡リンク -->
                <div class="contact-links">
                    <a
                        class="contact-link"
                        href="https://github.com/okumurachie"
                        target="_blank"
                        rel="noopener"
                    >
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path
                                d="M12 0C5.37 0 0 5.373 0 12c0 5.303 3.438 9.8 8.205 11.387.6.113.82-.258.82-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.84 1.237 1.84 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"
                            />
                        </svg>
                        GitHub
                    </a>
                </div>
            </div>
        </main>

        <script src="../components.js"></script>
        <script src="../script.js"></script>
    </body>
</html>
